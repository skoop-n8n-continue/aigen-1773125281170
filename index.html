<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Hello World Digital Signage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=v1.0.1">
</head>
<body>
    <div class="container">
        <div class="content">
            <h1 class="fade-in">Hello World</h1>
            <p class="fade-in-delayed">Welcome to your digital signage display.</p>
            <div class="showcase fade-in-delayed">
                <div class="showcase-item">
                    <img src="https://skoop-dev-code-agent.s3.us-east-1.amazonaws.com/n8n-continue%2Faigen-1773125281170%2Fassets%2Fdigital_signage_display-1773125752934.png?v=v1.0.1" alt="Digital Signage Display">
                    <span>Corporate Display</span>
                </div>
                <div class="showcase-item">
                    <img src="https://skoop-dev-code-agent.s3.us-east-1.amazonaws.com/n8n-continue%2Faigen-1773125281170%2Fassets%2Foled_screen_close_up-1773125752668.png?v=v1.0.1" alt="OLED Screen Close-up">
                    <span>OLED Technology</span>
                </div>
            </div>
        </div>
        <div class="clock-container fade-in-delayed">
            <span id="clock">00:00:00</span>
        </div>
        <div class="background-animation">
            <div class="circle circle-1"></div>
            <div class="circle circle-2"></div>
            <div class="circle circle-3"></div>
        </div>
    </div>
    <script src="script.js?v=v1.0.1"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
</body>
</html>
